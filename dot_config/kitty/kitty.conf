# Font
font_family JetBrainsMono Nerd Font Light
bold_font JetBrainsMono Nerd Font SemiBold
font_size 13
text_composition_strategy 1.0 0

# Theme (set via: kitty +kitten themes -- Catppuccin Mocha)
include current-theme.conf

# Use splits layout for window splitting support
enabled_layouts splits,stack

# Tab bar at the bottom
tab_bar_edge bottom
tab_bar_style powerline

map --new-mode tmux --on-action end --on-unknown end ctrl+a

# Send real ctrl+a when pressed twice
map --mode tmux ctrl+a send_key ctrl+a

# Splits (in tmux mode)
map --mode tmux % launch --location=vsplit --cwd=current
map --mode tmux | launch --location=vsplit --cwd=current
map --mode tmux \ launch --location=vsplit --cwd=current

map --mode tmux " launch --location=hsplit --cwd=current
map --mode tmux - launch --location=hsplit --cwd=current

# Pane navigation (in tmux mode) — vim-style and arrows
map --mode tmux h neighboring_window left
map --mode tmux j neighboring_window bottom
map --mode tmux k neighboring_window top
map --mode tmux l neighboring_window right
map --mode tmux left neighboring_window left
map --mode tmux down neighboring_window bottom
map --mode tmux up neighboring_window top
map --mode tmux right neighboring_window right

# Kill pane / kill window
map --mode tmux x close_window
map --mode tmux & close_tab

# Toggle split zoom — also recolors the active tab background while zoomed
map --mode tmux z kitten zoom_toggle.py

# Scrollback (tmux copy-mode)
map --mode tmux [ show_scrollback

# Scale the zoom indicator logo to a fraction of the window so it's visible
# on HiDPI (Retina) displays — default 0 renders at native pixel size.
window_logo_scale 8

# Tabs (in tmux mode)
map --mode tmux c new_tab
map --mode tmux n next_tab
map --mode tmux p previous_tab
map --mode tmux , set_tab_title
map --mode tmux 1 goto_tab 1
map --mode tmux 2 goto_tab 2
map --mode tmux 3 goto_tab 3
map --mode tmux 4 goto_tab 4
map --mode tmux 5 goto_tab 5
map --mode tmux 6 goto_tab 6
map --mode tmux 7 goto_tab 7
map --mode tmux 8 goto_tab 8
map --mode tmux 9 goto_tab 9

# Split navigation (direct keybindings, no prefix)
map ctrl+h neighboring_window left
map ctrl+j neighboring_window bottom
map ctrl+k neighboring_window top
map ctrl+l neighboring_window right

allow_remote_control yes
listen_on unix:/tmp/mykitty

# Reload config
map super+r load_config_file

# Scrollback
scrollback_lines 100000

# Clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
